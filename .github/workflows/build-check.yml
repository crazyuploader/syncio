name: Build Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install server dependencies
        run: bun install

      - name: Install client dependencies
        run: bun install
        working-directory: client

      - name: Build client
        run: bun run build
        working-directory: client
