services:
  backend:
    image: ghcr.io/iamneur0/syncio:backend-public
    environment:
      DATABASE_URL: 'postgresql://syncio:syncio@db:5432/syncio'
      JWT_SECRET: 'dev-secret'
      ENCRYPTION_KEY: 'dev-encryption-key-32-chars-long'
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    image: ghcr.io/iamneur0/syncio:frontend-public
    environment:
      BACKEND_URL: 'http://backend:4000'
    depends_on:
      - backend
    ports:
      - "3000:3000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: syncio
      POSTGRES_PASSWORD: syncio
      POSTGRES_DB: syncio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
